name: Manual Translation Fixer

on:
  workflow_dispatch: # Permite ejecución manual desde la pestaña Actions

permissions:
  contents: write

jobs:
  fix-translations:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Translation Fixer
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          GROQ_TRANSLATION_KEY: ${{ secrets.GROQ_TRANSLATION_KEY }}
          GROQ_REWRITE_KEY: ${{ secrets.GROQ_REWRITE_KEY }}
          GROQ_POLISH_KEY: ${{ secrets.GROQ_POLISH_KEY }}
          GROQ_EUSKERA2: ${{ secrets.GROQ_EUSKERA2 }}
        run: python scraper/fix_translations.py

      - name: Commit and push changes
        run: |
          git config --global user.name "Vitoria Translation Bot"
          git config --global user.email "bot@vitoriachronicle.com"
          git add data/news.json
          git commit -m "Manual translation fix - $(date +'%Y-%m-%d %H:%M')" || echo "No changes to commit"
          git pull --rebase origin main
          git push origin main

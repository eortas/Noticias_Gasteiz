name: Daily Vitoria Scraper

on:
  schedule:
    - cron: '0 */1 * * *' # Cada 1 hora
  workflow_dispatch: # Permite ejecución manual

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/with-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests beautifulsoup4 python-dotenv

      - name: Run Scraper
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: python scraper_vitoria.py

      - name: Commit and push changes
        run: |
          git config --global user.name "Vitoria Scraper Bot"
          git config --global user.email "bot@vitoriachronicle.com"
          git add data/news.json data/images/ scraper/history.json
          git commit -m "Automated news update - $(date +'%Y-%m-%d %H:%M')" || echo "No changes to commit"
          git push

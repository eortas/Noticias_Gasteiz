name: Daily Vitoria Scraper

on:
  workflow_dispatch: # Permite ejecución manual

permissions:
  contents: write

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 24
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Scraper and Rewriter
        id: scraper_step
        timeout-minutes: 20
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          GROQ_REWRITE_KEY: ${{ secrets.GROQ_REWRITE_KEY }}
          GROQ_REWRITE_2: ${{ secrets.GROQ_REWRITE_2 }}
          GROQ_REWRITE_3: ${{ secrets.GROQ_REWRITE_3 }}
          GROQ_POLISH_KEY: ${{ secrets.GROQ_POLISH_KEY }}
          GROQ_POLISH2: ${{ secrets.GROQ_POLISH2 }}
          GROQ_EUSKERA2: ${{ secrets.GROQ_EUSKERA2 }}
          GROQ_TRANSLATION_KEY: ${{ secrets.GROQ_TRANSLATION_KEY }}
          groq_KEY: ${{ secrets.groq_KEY }}
          GROQ_RESUMEN: ${{ secrets.GROQ_RESUMEN }}
          TRADUCCION_EUSKARA1: ${{ secrets.TRADUCCION_EUSKARA1 }}
          TRADUCCION_EUSKARA2: ${{ secrets.TRADUCCION_EUSKARA2 }}
          TRADUCCION_POLACO1: ${{ secrets.TRADUCCION_POLACO1 }}
          TRADUCCION_POLACO2: ${{ secrets.TRADUCCION_POLACO2 }}
          TRADUCCION_FRANCAIS: ${{ secrets.TRADUCCION_FRANCAIS }}
          TRADUCCION_FRANCAIS2: ${{ secrets.TRADUCCION_FRANCAIS2 }}
          TRADUCCION_FRANCAIS3: ${{ secrets.TRADUCCION_FRANCAIS3 }}
          TRADUCCION_FRANCAIS4: ${{ secrets.TRADUCCION_FRANCAIS4 }}
          TRADUCCION_ENGLISH1: ${{ secrets.TRADUCCION_ENGLISH1 }}
          TRADUCCION_ENGLISH2: ${{ secrets.TRADUCCION_ENGLISH2 }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          DEDUPLICITY1: ${{ secrets.DEDUPLICITY1 }}
          DEDUPLICITY2: ${{ secrets.DEDUPLICITY2 }}
          GROQ_EXTRA1: ${{ secrets.GROQ_EXTRA1 }}
          GROQ_EXTRA2: ${{ secrets.GROQ_EXTRA2 }}
          GROQ_EXTRA3: ${{ secrets.GROQ_EXTRA3 }}
          GROQ_EXTRA4: ${{ secrets.GROQ_EXTRA4 }}
          GROQ_EXTRA5: ${{ secrets.GROQ_EXTRA5 }}
          GROQ_EXTRA6: ${{ secrets.GROQ_EXTRA6 }}
          GROQ_EXTRA7: ${{ secrets.GROQ_EXTRA7 }}
          GROQ_EXTRA8: ${{ secrets.GROQ_EXTRA8 }}
          GROQ_EXTRA9: ${{ secrets.GROQ_EXTRA9 }}
          GROQ_EXTRA10: ${{ secrets.GROQ_EXTRA10 }}
          MISTRAL1: ${{ secrets.MISTRAL1 }}
          MISTRAL2: ${{ secrets.MISTRAL2 }}
          MISTRAL3: ${{ secrets.MISTRAL3 }}
          MISTRAL4: ${{ secrets.MISTRAL4 }}
          MISTRAL5: ${{ secrets.MISTRAL5 }}
        run: |
           python scraper/multi_scraper.py
           python scraper/filter_sponsored.py
           python scraper/parallel_rewrite.py
           python scraper/retranslate_missing.py
           python scraper/group_news.py
           python scraper/update_mood.py
           python scraper/generate_summary.py
           python scraper/update_podcast.py
           python scraper/enviar_telegram.py

      - name: Check and fix missing images
        if: always() && steps.scraper_step.outcome != 'skipped'
        run: |
          python scraper/fix_missing_images_ddg.py

      - name: Commit and push changes
        if: always() && steps.scraper_step.outcome != 'skipped'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config --global user.name "Vitoria Scraper Bot"
          git config --global user.email "bot@vitoriachronicle.com"
          git remote set-url origin https://x-access-token:${GITHUB_TOKEN}@github.com/${{ github.repository }}.git
          git add data/news.json scraper/history.json data/mood_history.json data/podcast.json data/sent_news_ids.json data/resumen.png
          git diff --cached --quiet || git commit -m "Automated news update - $(date +'%Y-%m-%d %H:%M')"
          git pull --rebase --autostash origin main
          git push origin main